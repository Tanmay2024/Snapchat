<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snapchat Clone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:410px;
    background:#0f0f0f;
    color:white;
    border-right:1px solid #222;
}

/* HEADER */

.header{
    height:80px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
    border-bottom:1px solid #222;
}

.profile img{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
}

.snap-logo{
    font-size:40px;
}

.actions{
    display:flex;
    gap:10px;
}

.circle-btn{
    width:48px;
    height:48px;
    border-radius:50%;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}

.blue{
    background:#00aaff;
}

/* NOTIFICATION */

.notification{
    text-align:center;
    padding:10px;
    border-bottom:1px solid #222;
    color:#d0d0d0;
}

.notification a{
    color:white;
}

/* SEARCH */

.search{
    padding:15px;
}

.search input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:25px;
    background:#222;
    color:white;
    outline:none;
}

/* FRIENDS */

.friend{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid #222;
}

.friend:hover{
    background:#1a1a1a;
}

.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.avatar img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
}

.details a{
    color:white;
    text-decoration:none;
}

.details h3{
    margin-bottom:4px;
}

.details p{
    color:#ff4d6d;
    font-size:14px;
}

.view-btn{
    background:#FFFC00;
    color:black;
    text-decoration:none;
    padding:10px 18px;
    border-radius:20px;
    font-weight:bold;
}

/* RIGHT PANEL */

.chat-frame{
    flex:1;
    border:none;
    height:100vh;
}

</style>
</head>

<body>

<div class="container">

    <div class="sidebar">

        <div class="header">

            <div class="profile">
                <img src="rohith.jpg">
            </div>

            <div class="snap-logo">👻</div>

            <div class="actions">
                <div class="circle-btn">👥</div>
                <div class="circle-btn blue">➕</div>
            </div>

        </div>

        <div class="notification">
            🔇 Notifications are off
            <a href="#">Learn more</a>
        </div>

        <div class="search">
            <input type="text" placeholder="Search">
        </div>

        <!-- Rohith -->

        <div class="friend">

            <div class="left">

                <div class="avatar">
                    <img src="rohith.jpg">
                </div>

                <div class="details">
                    <a href="rohith-chat.html" target="content">
                        <h3>Rohith Reddy</h3>
                    </a>
                    <p>New Snap • 5m</p>
                </div>

            </div>

            <a href="rohith-snap.html"
               target="content"
               class="view-btn">View</a>

        </div>

        <!-- Pranav -->

        <div class="friend">

            <div class="left">

                <div class="avatar">
                    <img src="pranav.jpg">
                </div>

                <div class="details">
                    <a href="pranav-chat.html" target="content">
                        <h3>Pranav</h3>
                    </a>
                    <p>New Snap • 20m</p>
                </div>

            </div>

            <a href="pranav-snap.html"
               target="content"
               class="view-btn">View</a>

        </div>

        <!-- Santosh -->

        <div class="friend">

            <div class="left">

                <div class="avatar">
                    <img src="santosh.jpg">
                </div>

                <div class="details">
                    <a href="santosh-chat.html" target="content">
                        <h3>Santosh</h3>
                    </a>
                    <p>New Snap • 1h</p>
                </div>

            </div>

            <a href="santosh-snap.html"
               target="content"
               class="view-btn">View</a>

        </div>

        <!-- Tanmay -->

        <div class="friend">

            <div class="left">

                <div class="avatar">
                    <img src="tanmay.jpg">
                </div>

                <div class="details">
                    <a href="tanmay-chat.html" target="content">
                        <h3>Tanmay</h3>
                    </a>
                    <p>New Snap • 10m</p>
                </div>

            </div>

            <a href="tanmay-snap.html"
               target="content"
               class="view-btn">View</a>

        </div>

    </div>

    <iframe
        name="content"
        class="chat-frame"
        src="welcome.html">
    </iframe>

</div>

</body>
</html>
