<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapchat Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <a class="logo" href="index.html" aria-label="Snapchat home">&#128123;</a>
    <input class="search-box" type="text" placeholder="Search">
    <nav class="nav-links">
      <span>Stories</span>
      <span>Spotlight</span>
      <span>Chat</span>
      <span>Lenses</span>
      <span>Snapchat+</span>
    </nav>
    <button class="download-btn" type="button">Download</button>
  </header>

  <main class="settings-page">
    <section class="settings-card">
      <div class="profile-header">
        <div class="snapcode" aria-hidden="true"></div>
        <div>
          <h2 id="profile-name" class="profile-name">user</h2>
          <p id="profile-username" class="username">user</p>
        </div>
      </div>

      <div class="chat-box">
        <p>Chat, Snap and video call your friends:</p>
        <button class="chat-button" type="button">Chat now</button>
      </div>

      <div class="settings-list">
        <button class="settings-row" type="button" data-setting="My Data">My Data <span class="arrow">&rsaquo;</span></button>
        <button class="settings-row" type="button" data-setting="My Snapcode">My Snapcode <span class="arrow">&rsaquo;</span></button>
        <button class="settings-row" type="button" data-setting="Snapchat+">Snapchat+ <span class="arrow">&rsaquo;</span></button>
        <button class="settings-row" type="button" data-setting="Content Visibility on Web">Content Visibility on Web <span class="arrow">&rsaquo;</span></button>
        <button class="settings-row" type="button" data-setting="Contact Management">Contact Management <span class="arrow">&rsaquo;</span></button>
        <button class="settings-row" type="button" data-setting="My Reports">My Reports <span class="arrow">&rsaquo;</span></button>
        <button class="settings-row" type="button" data-setting="Ads Manager">Ads Manager <span class="arrow">&rsaquo;</span></button>
        <button class="settings-row" type="button" data-setting="Manage Apps">Manage Apps <span class="arrow">&rsaquo;</span></button>
        <button class="settings-row" type="button" data-setting="Session Management">Session Management <span class="arrow">&rsaquo;</span></button>
        <button class="settings-row" type="button" data-setting="Change my password">Change my password <span class="arrow">&rsaquo;</span></button>
      </div>

      <div class="settings-list">
        <button class="settings-row danger" type="button" data-setting="Delete my account">Delete my account <span class="arrow">&rsaquo;</span></button>
        <button id="logout-button" class="settings-row" type="button">Logout <span class="arrow">&rarr;</span></button>
      </div>

      <p id="message-box" class="message-box">Select any option to open it.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
