<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snapchat Chat - Rohith Reddy(Bhaai)</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>

 
        
        
    <!-- Right Pane: Active Chat Window (Rohith Reddy) -->
    <div class="chat-box">
      
      <!-- Chat Header -->
      <div class="chat-header">
        <span class="chat-title"><img src="rohith.jpeg" class="avatar" alt="Rohith" style="width: 32px; height: 32px; border-radius: 50%; vertical-align: middle; margin-right: 8px; object-fit: cover;"> Rohith Reddy(Bhaai)</span>
        <div class="header-actions">
          <button class="call-btn" type="button">📞 Call</button>
          <button class="call-btn" type="button">📹 Video</button>
        </div>
      </div>
      
      <!-- Message History -->
      <div class="messages-area">
        
        <div class="date-header">Yesterday</div>

        <div class="message-group">
          <div class="sender-label">Rohith Reddy</div>
          <div class="message red-message">
            <span>⬜ Opened</span> 📷
          </div>
        </div>

        <div class="message-group">
          <div class="sender-label me">Me</div>
          <div class="message red-message">
            <span>▷ Opened</span>
          </div>
        </div>
        
        <div class="date-header">Today</div>

        <div class="message-group">
          <div class="sender-label">Rohith Reddy</div>
          <div class="message red-message">
            <span>⬜ Snap Replayed</span> 🔄
          </div>
          
          <!-- Saved Car Image Block -->
          <div class="message saved-media-message" style="background-color: #1e1e22; border-left: 3px solid #fffc00; border-radius: 4px; padding: 10px; max-width: 280px; margin: 8px 0; display: flex; flex-direction: column; gap: 6px;">
            <div style="font-size: 11px; color: #a0a0a5; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">📌 Saved in Chat</div>
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=400&q=80" alt="Saved Car" style="width: 100%; border-radius: 4px; border: 1px solid #3a3a3c; display: block;">
          </div>
        </div>

      </div>

      <!-- Bottom Chat Input Bar -->
      <div class="input-bar">
        <button class="camera-icon" type="button">📷</button>
        <input type="text" placeholder="Send a chat...">
        <button class="send-btn" type="button">Send</button>
      </div>

    </div>

  </div>

</body>
</html>
