<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snapchat Chat - Santhosh</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Left Sidebar: Friends List -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>💬 Snapchat</h2>
        <input type="text" placeholder="Search friends...">
      </div>
      
      <div class="friend-list">
        
        <!-- Friend 1: Tanmay(TL) -->
        <a href="tanmay-chat.html" class="friend-link">
          <div class="friend">
            <img src="tanmay.jpeg" class="avatar" alt="Tanmay">
            <div class="info">
              <span class="name">Tanmay(TL)</span>
              <span class="status">⬜ Opened • 2h</span>
            </div>
          </div>
        </a>
        
        <!-- Friend 2: Rohith Reddy(Bhaai) -->
        <a href="rohith-chat.html" class="friend-link">
          <div class="friend">
            <img src="rohith.jpeg" class="avatar" alt="Rohith">
            <div class="info">
              <span class="name">Rohith Reddy</span>
              <span class="status">🟥 Received • 1h</span>
            </div>
          </div>
        </a>
        
        <!-- Friend 3: Santhosh (Active) -->
        <a href="santosh-chat.html" class="friend-link">
          <div class="friend active">
            <img src="santosh.jpeg" class="avatar" alt="Santosh">
            <div class="info">
              <span class="name">Santhosh</span>
              <span class="status">🟪 Received • 1h</span>
            </div>
          </div>
        </a>
        
        <!-- Friend 4: Pranav -->
        <a href="pranav-chat.html" class="friend-link">
          <div class="friend">
            <img src="pranav.jpeg" class="avatar" alt="Pranav">
            <div class="info">
              <span class="name">Pranav</span>
              <span class="status">⬜ Opened • 5m</span>
            </div>
          </div>
        </a>
        
      </div>
    </div>

    <!-- Right Pane: Active Chat Window (Santhosh) -->
    <div class="chat-box">
      
      <!-- Chat Header -->
      <div class="chat-header">
        <span class="chat-title"><img src="santosh.jpeg" class="avatar" alt="Santosh" style="width: 32px; height: 32px; border-radius: 50%; vertical-align: middle; margin-right: 8px; object-fit: cover;"> Santhosh</span>
        <div class="header-actions">
          <button class="call-btn" type="button">📞 Call</button>
          <button class="call-btn" type="button">📹 Video</button>
        </div>
      </div>
      
      <!-- Message History -->
      <div class="messages-area">
        
        <div class="date-header">Yesterday</div>

        <div class="message-group">
          <div class="sender-label">Santhosh</div>
          <div class="message purple-message">
            <span>⬜ Opened</span> 📹
          </div>
        </div>

        <div class="message-group">
          <div class="sender-label me">Me</div>
          <div class="message purple-message">
            <span>▷ Opened</span>
          </div>
        </div>
        
        <div class="date-header">Today</div>

        <div class="message-group">
          <div class="sender-label">Santhosh</div>
          <div class="message purple-message">
            <span>⬜ Received</span> 📹
          </div>
        </div>

      </div>

      <!-- Bottom Chat Input Bar -->
      <div class="input-bar">
        <button class="camera-icon" type="button">📷</button>
        <input type="text" placeholder="Send a chat...">
        <button class="send-btn" type="button">Send</button>
      </div>

    </div>

  </div>

</body>
</html>
